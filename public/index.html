<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Invite</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <p class="label">A little question for you</p>
      <h1>Will you go on a date with me?</h1>
      <p id="status">Choose an option below.</p>

      <div class="button-row">
        <button id="yesBtn" type="button">Yes</button>
        <button id="noBtn" type="button">No</button>
      </div>

      <p id="reply" class="reply"></p>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
